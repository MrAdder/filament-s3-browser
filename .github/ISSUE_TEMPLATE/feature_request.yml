name: Feature request
description: Suggest an improvement for Filament S3 Browser.
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
        A strong feature request explains the problem first, then the proposed behavior.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow is blocked, slow, or awkward today?
      placeholder: I need to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the user-facing behavior you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share any workarounds or competing approaches you tried.

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Links, screenshots, example APIs, or implementation notes.
