name: Release

on:
  workflow_call:
    secrets:
      PACKAGIST_USERNAME:
        required: false
      PACKAGIST_TOKEN:
        required: false
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
          extensions: mbstring, dom, fileinfo, intl
          cache: composer

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer update --prefer-dist --prefer-stable --no-interaction --no-progress

      - name: Run release checks
        run: |
          vendor/bin/pint --test
          vendor/bin/phpstan analyse --no-progress
          vendor/bin/pest --colors=always

  notify-packagist:
    name: Notify Packagist
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Detect Packagist credentials
        id: packagist
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          if [ -n "${PACKAGIST_USERNAME}" ] && [ -n "${PACKAGIST_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger package update
        if: ${{ steps.packagist.outputs.enabled == 'true' }}
        run: |
          curl --fail-with-body --request POST \
            --url "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_TOKEN}" \
            --header "content-type: application/json" \
            --data '{"repository":{"url":"https://github.com/mradder/filament-s3-browser"}}'
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}

      - name: Skip Packagist notification
        if: ${{ steps.packagist.outputs.enabled != 'true' }}
        run: echo "Packagist credentials are not configured. Skipping package update notification."
